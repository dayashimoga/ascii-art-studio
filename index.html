<!DOCTYPE html>
<html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Art Studio — Text Art Generator | QuickUtils</title>
    <meta name="keywords" content="QuickUtils, ascii, art, studio, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://quickutils.top/ascii-art-studio/">
    <meta property="og:title" content="ASCII Art Studio — Text Art Generator | QuickUtils">
    <meta property="og:description" content="Convert images to ASCII art, generate text banners with figlet fonts, and create freehand ASCII drawings.">
    <meta property="og:url" content="https://quickutils.top/ascii-art-studio/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
<meta name="description" content="Convert images to ASCII art, generate text banners with figlet fonts, and create freehand ASCII drawings.">
<link rel="stylesheet" href="style.css"></head>
<body><nav class="navbar"><div class="container nav-inner"><a href="https://quickutils.top" class="brand">✏️ ASCII Art Studio</a><div class="nav-links"><button id="copyBtn" class="btn btn-sm btn-secondary">📋 Copy</button><button id="downloadBtn" class="btn btn-sm btn-secondary">📥 Download</button><button id="themeBtn" class="theme-btn">🌙</button></div></div></nav>
<main class="container" style="margin-top:1.5rem">
<div class="tabs glass-card"><button class="tab active" data-tab="banner">🔤 Text Banner</button><button class="tab" data-tab="image">🖼 Image to ASCII</button><button class="tab" data-tab="draw">✏️ Freehand</button></div>
<div class="panel" id="panel-banner">
    <div class="glass-card" style="margin-top:1rem">
        <label>Your Text<input type="text" id="bannerInput" value="HELLO" maxlength="20" style="font-size:1.2rem;letter-spacing:2px"></label>
        <div class="font-options">
            <label>Font<select id="fontSelect"><option value="standard">Standard</option><option value="block">Block</option><option value="shadow">Shadow</option><option value="banner">Banner</option><option value="big">Big</option><option value="mini">Mini</option><option value="bubble">Bubble</option><option value="digital">Digital</option></select></label>
            <label>Width<input type="range" id="bannerWidth" min="40" max="120" value="80"><span id="widthVal">80</span></label>
        </div>
    </div>
    <pre id="bannerOutput" class="glass-card ascii-output"></pre>
</div>
<div class="panel hidden" id="panel-image">
    <div class="glass-card" style="margin-top:1rem">
        <input type="file" id="imageUpload" accept="image/*">
        <canvas id="imgCanvas" style="display:none"></canvas>
        <label>Width (chars)<input type="range" id="imgWidth" min="40" max="150" value="80"><span id="imgWidthVal">80</span></label>
        <label>Charset<select id="charset"><option value="standard">Standard (@#%*+=-:. )</option><option value="blocks">Blocks (█▓▒░ )</option><option value="simple">Simple (#*. )</option></select></label>
    </div>
    <pre id="imageOutput" class="glass-card ascii-output"></pre>
</div>
<div class="panel hidden" id="panel-draw">
    <div class="glass-card" style="margin-top:1rem">
        <div class="draw-toolbar">
            <label>Char<input type="text" id="drawChar" value="█" maxlength="1" style="width:40px;text-align:center;font-size:1.2rem"></label>
            <button class="btn btn-sm btn-secondary" id="clearDrawBtn">🗑 Clear</button>
            <span class="text-muted" style="font-size:.75rem">Click & drag to draw on the grid below</span>
        </div>
    </div>
    <div class="glass-card draw-container" style="margin-top:1rem">
        <div id="drawGrid" class="draw-grid"></div>
    </div>
    <pre id="drawOutput" class="glass-card ascii-output" style="margin-top:1rem"></pre>
</div>
</main>
<script src="script.js"></script></body></html>
